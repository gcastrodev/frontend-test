<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Personal Finance</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link rel="shortcut icon" href="./public/favicon.png" type="image/x-icon">
    <script src='main.js' defer></script>
</head>
<body>
    <header>
        <h1>Personal Finance</h1>
        <p class="autor">by Gabriel Castro</p>
        <p class="subtitulo">Organizando sua vida financeira desde 2026</p>
    </header>
    <main>
        <section class="formulario">
      <h2>Registrar Gasto</h2>
      <form id="form-gasto">
        <div class="campo">
          <label for="descricao">Descrição</label>
          <input type="text" id="descricao" placeholder="Ex: Almoço" required>
        </div>
        <div class="campo">
          <label for="valor">Valor (R$)</label>
          <input type="number" id="valor" placeholder="0,00" min="0.01" step="0.01" required>
        </div>
        <div class="campo">
          <label for="categoria">Categoria</label>
          <select id="categoria">
            <option value="Habitacao">Habitação</option>
            <option value="Alimentacao">Alimentação</option>
            <option value="Utilidades">Utilidades Domésticas</option>
            <option value="Transporte">Transporte</option>
            <option value="Lazer">Lazer</option>
            <option value="Saude">Saúde</option>
            <option value="Educação">Educação</option>
          </select>
        </div>
        <button type="submit">Registrar Gasto</button>
      </form>
    </section>

    <section class="painel">
      <h2>Gastos do Mês</h2>

      <div class="total-box">
        <span>Total gasto:</span>
        <strong id="total">R$ 0,00</strong>
      </div>

      <div class="tabela-gastos-wrap">
        <table id="tabela-gastos">
          <thead>
            <tr>
              <th>Descrição</th>
              <th>Categoria</th>
              <th>Valor</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="lista-gastos">
            <!-- JS -->
          </tbody>
        </table>
      </div>

      <p id="msg-vazia">Nenhum gasto registrado ainda.</p>

    </section>
    </main>
    <footer>
        <a href="https://github.com/gcastrodev" target="_blank">GitHub</a>
        <a href="https://www.linkedin.com/in/gabriel-castro-b39b50358/" target="_blank">LinkedIn</a>
        <p>&copy; 2023 Personal Finance. Todos os direitos reservados.</p>
    </footer>
</body> 
</html>
